<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Libre+Baskerville:italic@400&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aman Design Portfolio</title>
    <link rel="icon" type="image/webp" href="/image/mascot_img_3x.webp" />
    <script>
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
      // Clear hash on load to prevent browser from jumping to sections
      if (window.location.hash) {
        window.history.replaceState(null, '', window.location.pathname + window.location.search);
      }
      window.scrollTo(0, 0);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
